<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="src/main.js" type="module" defer></script>
    <title>Task Manager App</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>SuperTask.</h1>
        <p>Gerencie suas tarefas com eficiência.</p>
      </header>
      <section class="input-section">
        <form>
          <input name="todo" id="todo" type="text" placeholder="Adicionar uma nova tarefa..." />
          <button type="submit">Enviar</button>
        </form>
      </section>
      <section class="filters">
        <button data-filter="all" class="all selected">Todas</button>
        <button data-filter="pending" class="pending">Pendentes</button>
        <button data-filter="done" class="done">Concluídas</button>
      </section>
      <section class="todos-list">
        <ul class="list">
          
          <!-- <li>
            <span>Aprender JS</span>
            <div class="actions">
              <button class="done-btn">
                <i class="fa-solid fa-check"></i>
              </button>
              <button class="delete-btn">
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </div>
          </li> -->
          
        </ul>
      </section>
      <footer>
        <p>Você possui <span id="total-pending"></span> tarefa(s) pendente(s).</p>
      </footer>
    </div>
  </body>
</html>
